{% extends 'base.html' %}

<body>
    {% block content %}
    <div class="profile-container">
   <form class="profile-form" action="/profile" method="post" enctype="multipart/form-data">
    <h2>User Profile</h2>

    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="fullname" name="name" placeholder="Enter your full name" value="{{ profile.name if profile else '' }}" required>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" value="{{ profile.email if profile else '' }}" required>
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" title="Enter a valid 10-digit phone number" value="{{ profile.number if profile else '' }}" required>
    </div>

    <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself">{{ profile.bio if profile else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="profilePic">Profile Picture</label>
        <input type="file" id="profilePic" name="profilePic" accept="image/*">
    </div>


    <button type="submit">Save Profile</button>
</form>
</div>
    {% endblock %}
</body>
